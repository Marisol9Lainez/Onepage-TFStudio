<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f6f7fb"/><stop offset="1" stop-color="#eceff5"/></linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9b6bff"/><stop offset="1" stop-color="#00d0d0"/></linearGradient>
<linearGradient id="metal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dfe4ea"/><stop offset="0.5" stop-color="#b8c1cc"/><stop offset="1" stop-color="#8b99a8"/></linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.25"/></filter>
</defs>
<rect width="900" height="1200" fill="url(#bg)"/>
<rect x="70" y="70" width="760" height="1060" rx="28" fill="#ffffff" stroke="#d1d5db" stroke-width="4"/>
<rect x="70" y="70" width="760" height="48" fill="url(#accent)"/>
<text x="450" y="108" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff">FOTOS EN CONSTRUCCIÓN</text>
