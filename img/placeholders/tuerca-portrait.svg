    <circle cx="-200" cy="-240" r="70" fill="#9b6bff"/>
    <circle cx="220" cy="-260" r="60" fill="#00d0d0"/>
  </g>
</g>
<rect x="200" y="980" width="500" height="90" rx="14" fill="#111827" opacity="0.94"/>
