<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f6f7fb"/><stop offset="1" stop-color="#eceff5"/></linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9b6bff"/><stop offset="1" stop-color="#00d0d0"/></linearGradient>
<linearGradient id="metal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dfe4ea"/><stop offset="0.5" stop-color="#b8c1cc"/><stop offset="1" stop-color="#8b99a8"/></linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.25"/></filter>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<rect x="80" y="80" width="1440" height="740" rx="28" fill="#ffffff" stroke="#d1d5db" stroke-width="4"/>
<rect x="80" y="80" width="1440" height="48" fill="url(#accent)"/>
<text x="800" y="114" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle" fill="#ffffff">FOTOS EN CONSTRUCCIÓN</text>
<g transform="translate(0,40)">
<g transform="translate(800,500) scale(1.2)" filter="url(#shadow)">
  <g>
    <polygon points="0,-220 190,-110 190,110 0,220 -190,110 -190,-110" fill="url(#metal)" stroke="#7b8796" stroke-width="10"/>
    <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" fill="#f0f3f7" stroke="#99a3af" stroke-width="8"/>
    <circle cx="0" cy="0" r="60" fill="#e2e8f0" stroke="#a3afbb" stroke-width="6"/>
  </g>
  <g opacity="0.18">
    <circle cx="-240" cy="-180" r="80" fill="#9b6bff"/>
    <circle cx="260" cy="-200" r="70" fill="#00d0d0"/>
  </g>
</g>
</g>
<rect x="420" y="730" width="760" height="90" rx="14" fill="#111827" opacity="0.94"/>
<text x="800" y="788" font-family="Rajdhani, Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle" fill="#ffffff">Imágenes en preparación</text>
</svg>